<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla | Model 3 Configurator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-concept">

<header>
    <a href="index.html" class="logo">TESLA</a>
    <nav>
        <a href="index.html">Home</a>
        <div class="nav-dropdown">
            <a href="model-3.html" class="dropdown-toggle">Products</a>
            <div class="nav-dropdown-menu">
                <a href="model-s.html">Model S</a>
                <a href="model-3.html">Model 3</a>
                <a href="model-x.html">Model X</a>
                <a href="model-y.html">Model Y</a>
                <a href="cybertruck.html">Cybertruck</a>
                <a href="home-charger.html">Home Charger</a>
            </div>
        </div>
        <a href="inventory.html" class="active">Inventory</a>
        <a href="contact.html">Contact</a>
        <a href="schedule.html">Schedule</a>
    </nav>
    <div class="nav-right">
        <a href="inventory.html" class="btn btn-red btn-order-compact">ORDER</a>
    </div>
</header>

<main class="order-config-main">
    <section class="order-config-layout">

        <div class="order-config-visual">
            <img id="car-image" src="mod3-white.png" alt="Model 3">
            </div>

        <div class="order-config-panel">
            <a href="inventory.html" class="order-back-link">&larr; Back to inventory</a>
            <h1>Model 3</h1>

            <p class="order-config-sub">Custom Order Delivery: Oct - Nov 2024</p>

            <p class="config-section-title">Paint</p>
            <div class="config-chip-row">
                <button class="config-chip active" data-paint="white" style="background:#f2f2f2;"></button>
                <button class="config-chip" data-paint="blue" style="background:#1f3f8f;"></button>
                <button class="config-chip" data-paint="silver" style="background:#8793a5;"></button>
                <button class="config-chip" data-paint="black" style="background:#0d0d0d;"></button>
                <button class="config-chip" data-paint="red" style="background:#d12028;"></button>
            </div>

            <p class="config-section-title">Wheels</p>
            <div class="config-tiles">
                <article class="config-tile active">
                    <img src="w18.png">
                    <strong>18" Photon Wheels</strong>
                    <span>Included</span>
                </article>
                <article class="config-tile">
                    <img src="19nova.png">
                    <strong>19" Nova Wheels</strong>
                    <span>$1,500</span>
                </article>
            </div>

            <div class="order-config-price">
                <div>
                    <span>Vehicle price</span>
                    <strong>$38,990</strong>
                </div>
                <span>Est. $584/mo</span>
            </div>

            <label class="order-home-charger">
                <input type="checkbox" data-home-charger> Include home charger (+$450)
            </label>

            <button class="btn btn-red order-config-cta" type="button"
                data-order-model="Model 3"
                data-order-trim="Long Range All-Wheel Drive"
                data-order-price="$38,990"
                data-order-image="mod3.png">
                Continue to payment
            </button>
        </div>
    </section>
</main>

<script src="script.js"></script>

<script>
const chips = document.querySelectorAll(".config-chip");
const carImg = document.getElementById("car-image");

chips.forEach(chip => {
    chip.addEventListener("click", () => {

        // active
        chips.forEach(c => c.classList.remove("active"));
        chip.classList.add("active");

        // đổi ảnh
        const color = chip.dataset.paint;

        carImg.style.opacity = 0;

        setTimeout(() => {
            carImg.src = "mod3-" + color + ".png";
            carImg.style.opacity = 1;
        }, 200);
    });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách hóa đơn</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        
        .title {
            font-style: italic;
            font-weight: bold;
            margin-bottom: 10px;
        }

        table {
            border-collapse: collapse;
            width: 600px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f9f9f9;
            text-align: center;
        }

        .center-col {
            text-align: center;
        }
        
        .value-input {
            width: 90%;
            padding: 3px;
            box-sizing: border-box;
        }
        
        .action-buttons td {
            text-align: right;
            border-top: none;
        }

        .action-buttons button {
            margin-left: 5px;
            padding: 4px 10px;
            cursor: pointer;
        }
        
        .total-row {
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class = "title"> Your orders </div>
    
    <form action = "process.php" method = "post" id = "orderForm">
        <table>
            <thead>
                <tr>
                    <th style = "width: 30px;"> <input type = "checkbox" id = "checkAll"> </th>
                    <th> Order No </th>
                    <th> Customer Name </th>
                    <th> Order Date </th>
                    <th> Value </th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class = "center"> <input type = "checkbox" class = "check-item" name = "order_ids[]" value = "SHD11"> </td>
                    <td> SHD 11 </td>
                    <td> Nguyen Van A </td>
                    <td> 12/2/2009 </td>
                    <td> <input type = "number" name = "values[SHD11]" class = "val" value = "20000"> </td>
                </tr>
                <tr>
                    <td class = "center"> <input type = "checkbox" class = "check-item" name = "order_ids[]" value = "SHD12"> </td>
                    <td> SHD 12</td>
                    <td> Nguyen Bich Thao </td>
                    <td> 12/11/2009 </td>
                    <td> <input type = "number" name = "values[SHD12]" class = "val" value = "55000"> </td>
                </tr>
                <tr>
                    <td colspan = "4" class = "right"> <b> Total: </b> </td>
                    <td> <input type = "text" id = "total" readonly> </td>
                </tr>
                <tr>
                    <td colspan = "5" class = "buttons">
                        <button type = "button" onclick = "calculateTotal()"> Update </button>
                        <button type = "submit"> Save </button>
                        <button type = "button" id = "btnBack"> Back </button>
                        <button type = "button" id = "btnReset"> Reset </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </form>
    
    <script>
        const checkboxes = document.querySelectorAll('.check-item');
        const inputs = document.querySelectorAll('.val');
        const checkAll = document.getElementById('checkAll');

        let history = [];
    
        function saveState() {
            let state = {
                checks: Array.from(checkboxes).map(c => c.checked),
                vals: Array.from(inputs).map(i => i.value),
                allChecked: checkAll.checked
            };
            history.push(state);
            if (history.length > 20) history.shift();
        }
    
        saveState();
    
        document.getElementById('btnBack').onclick = function() {
            if (history.length > 1) {
                history.pop();
                let last = history[history.length - 1];
                
                checkboxes.forEach((c, i) => c.checked = last.checks[i]);
                inputs.forEach((input, i) => input.value = last.vals[i]);
                checkAll.checked = last.allChecked;
                calculateTotal();
            }
        };
    
        document.getElementById('btnReset').onclick = function() {
            checkboxes.forEach(c => c.checked = false);
            checkAll.checked = false;
            saveState();
        };
    
        function calculateTotal() {
            let sum = 0;
            const rows = document.querySelectorAll('tbody tr:not(.action-buttons):not(:has(.total-row))');
            
            rows.forEach(row => {
                const checkbox = row.querySelector('.check-item');
                const input = row.querySelector('.val');
                
                if (checkbox && checkbox.checked) {
                    sum += Number(input.value) || 0;
                }
            });
            
            document.getElementById('total').value = sum;
        }
    
        checkAll.onclick = function() {
            checkboxes.forEach(c => c.checked = this.checked);
            saveState();
        };
    
        checkboxes.forEach(c => {
            c.onchange = function() {
                checkAll.checked = Array.from(checkboxes).every(item => item.checked);
                saveState();
            };
        });

        inputs.forEach(i => i.onchange = saveState);
    
        calculateTotal();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casio Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        .calculator {
            background-color: #333333;
            width: 360px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .brand {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-family: "Times New Roman", serif;
        }

        .display-container {
            margin-bottom: 20px;
        }

        #display {
            width: 100%;
            height: 60px;
            background-color: #9cb0a8;
            border: none;
            border-radius: 5px;
            text-align: right;
            padding: 10px 15px;
            font-size: 2rem;
            color: #2d2d2d;
            font-family: 'Courier New', monospace;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            outline: none;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        button {
            height: 50px;
            border: none;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: filter 0.1s;
        }

        button:active {
            filter: brightness(0.9);
            transform: translateY(1px);
        }

        .btn-num {
            background-color: #ecf0f1;
            color: #333;
        }

        .btn-op {
            background-color: #d35400;
            color: white;
        }

        .btn-red {
            background-color: #e74c3c;
            color: white;
        }

        .btn-green {
            background-color: #55a659;
            color: white;
            grid-column: span 2;
        }

    </style>
</head>
<body>

    <div class="calculator">
        <div class="brand">CASIO</div>
        
        <div class="display-container"> <input type="text" id="display" readonly> </div>

        <div class="buttons">
            <button class="btn-red" onclick="clearDisplay()">C</button>
            <button class="btn-num" onclick="appendValue('0')">0</button>
            <button class="btn-num" onclick="appendValue('00')">00</button>
            <button class="btn-op" onclick="appendValue('/')">/</button>
            <button class="btn-op" onclick="appendValue('**')">^</button>

            <button class="btn-num" onclick="appendValue('1')">1</button>
            <button class="btn-num" onclick="appendValue('2')">2</button>
            <button class="btn-num" onclick="appendValue('3')">3</button>
            <button class="btn-op" onclick="appendValue('-')">-</button>
            <button class="btn-op" onclick="appendValue('%')">%</button>

            <button class="btn-num" onclick="appendValue('4')">4</button>
            <button class="btn-num" onclick="appendValue('5')">5</button>
            <button class="btn-num" onclick="appendValue('6')">6</button>
            <button class="btn-op" onclick="appendValue('+')">+</button>
            <button class="btn-op" onclick="appendValue('*')">/</button> 

            <button class="btn-num" onclick="appendValue('7')">7</button>
            <button class="btn-num" onclick="appendValue('8')">8</button>
            <button class="btn-num" onclick="appendValue('9')">9</button>
            <button class="btn-green" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendValue(input) {
            const c = display.value.slice(-1);
            if (['+', '-', '*', '/', '%'].includes(c) && ['+', '-', '*', '/', '%'].includes(input)) return;
            
            display.value += input;
        }
        
        function clearDisplay() {
            display.value = '';
        }

        function calculate() {
            try {
                let res = eval(display.value);
                if (!isFinite(res) || isNaN(res)) display.value = "Error";
                else display.value = res;
            }
            catch (error) {
                display.value = "Error";
            }
        }
    </script>
</body>
</html>

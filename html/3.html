<!DOCTYPE html>
<html>
<head>
    <title> Đăng Kí Câu Lạc Bộ Thể Thao </title>
<style>
body {
    font-family: Arial, sans-serif;
}
table {
    border: 1;
    border-collapse: collapse;
    border-color:#ccc;
}

</style>
</head>
<body>
    <table width = "600" align = "center" border = "1" cellspacing = "0" cellpadding = "10">
        <tr bgcolor = "#d6eaf8">
            <td align = "center">
                <h1 style = "color: #000000; margin: 0; background-color: #e67e22; display: inline-block;"> CÂU LẠC BỘ THỂ THAO </h1>
                <p style = "font-style: italic; color: #c91616;"> ------Bùng cháy sẽ thấy thành công------ </p>
            </td>
        </tr>
        <tr>
            <td style = "padding: 20px;">
                <h2 align = "center"> ĐĂNG KÍ THÀNH VIÊN CLB THỂ THAO </h2>

                <form>
                    <table width = "100%" cellpadding = "5">
                        <tr>
                            <td colspan = "2" align = "center">
                            <button type = "button"> Lời chào </button> </td>
                        </tr>
                        <tr>
                            <td align = "right"> Họ tên: </td>
                            <td> <input type = "text" name = "hoTen" size = "21"> </td>
                        </tr>
                        <tr>
                            <td align = "right"> Mật khẩu: </td>
                            <td> <input type = "password" name = "matKhau" size = "21"> </td>
                        </tr>
                        <tr>
                            <td align = "right"> Ngày sinh: </td>
                            <td> <input type = "date" name = "ngaySinh"> </td>
                        </tr>
                        <tr>
                            <td align = "right" valign = "top"> Địa chỉ: </td>
                            <td> <textarea name = "diaChi" rows = "4" cols = "37"> </textarea> </td>
                        </tr>
                        <tr>
                            <td align = "right"> Giới tính: </td>
                            <td>
                                <input type = "radio" name = "gioiTinh" value = "Nam"> Nam <br>
                                <input type = "radio" name = "gioiTinh" value = "Nữ"> Nữ
                            </td>
                        </tr>
                        <tr>
                            <td align = "right" valign = "top"> Sở thích: </td>
                            <td>
                                <input type = "checkbox" name = "soThich" value = "Co vua"> Cờ vua<br>
                                <input type = "checkbox" name = "soThich" value = "Tro choi dien tu"> Trò chơi điện tử<br>
                                <input type = "checkbox" name = "soThich" value = "Du lich"> Du lịch<br>
                                <input type = "checkbox" name = "soThich" value = "Cam hoa"> Cắm hoa<br>
                                <input type = "checkbox" name = "soThich" value = "Nau an"> Nấu ăn
                            </td>
                        </tr>
                        <tr>
                            <td align = "right"> Hồ sơ đính kèm: </td>
                            <td> <input type = "file" name = "hoSo"> </td>
                        </tr>
                        <tr>
                            <td align = "right"> Đăng kí CLB: </td>
                            <td>
                                <select name = "clb">
                                    <option value = "bongDa"> Bóng đá </option>
                                    <option value = "bongRo"> Bóng rổ </option>
                                    <option value = "boiLoi"> Bơi lội </option>
                                    <option value = "cauLong"> Cầu lông </option>
                                    <option value = "bongBan"> Bóng bàn </option>
                                    <option value = "voThuat"> Võ thuật </option>
                                    <option value = "bongChuyen"> Bóng chuyền </option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td> </td>
                            <td> <input type = "submit" value = "Đăng kí"> </td>
                        </tr>
                    </table>
                </form>
            </td>
        </tr>
        <tr bgcolor = "#d6eaf8">
            <td align = "center">
                <p> <b> Liên hệ: </b> <br>
                <a href = "http://www.clb.hanoi.com.vn"> www.clb.hanoi.com.vn </a> <br>
                024.35353535 - 0968888888 </p>
            </td>
        </tr>
    </table>
</body>
</html>
